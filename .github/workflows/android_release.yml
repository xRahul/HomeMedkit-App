name: 'Release'

on:
  workflow_dispatch:

jobs:
  validation:
    name: Validation (Lint & Tests)
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5

      - name: 'Run Lint and Tests'
        run: ./gradlew lintRelease testReleaseUnitTest

  get-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ steps.extract_version.outputs.version_code }}
      version_name: ${{ steps.extract_version.outputs.version_name }}
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5

      - name: 'Extract versions from build.gradle'
        id: extract_version
        run: |
          VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | sed 's/[^0-9]*//g')
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | cut -d '"' -f 2)
          echo "Извлечено: versionCode=${VERSION_CODE}, versionName=${VERSION_NAME}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

  prepare-changelog:
    name: Prepare Changelog
    runs-on: ubuntu-latest
    needs: get-version
    outputs:
      release_body: ${{ steps.generate_changelog.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Setup Python'
        uses: actions/setup-python@v5

      - name: 'Generate changelog'
        id: generate_changelog
        run: |
          CHANGELOG_BODY=$(python .github/scripts/generate_changelog.py ${{ needs.get-version.outputs.version_code }})
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo "$CHANGELOG_BODY" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  build:
    name: Build & Sign
    runs-on: ubuntu-latest
    needs: [ validation, get-version ]
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v5

      - name: 'Build release APK & AAB'
        run: ./gradlew assembleRelease bundleRelease
        env:
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}

      - name: 'Sign release APK'
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Sign release AAB'
        id: sign_aab
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/bundle/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Rename artifacts'
        run: |
          SIGNED_APK_FILE=$(find ${{ steps.sign_apk.outputs.signedFile }} -name '*.apk' | head -n 1)
          mv "$SIGNED_APK_FILE" "HomeMedkit.apk"
          
          SIGNED_AAB_FILE=$(find ${{ steps.sign_aab.outputs.signedFile }} -name '*.aab' | head -n 1)
          mv "$SIGNED_AAB_FILE" "HomeMedkit.aab"

      - name: 'Upload artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            HomeMedkit.apk
            HomeMedkit.aab

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ get-version, prepare-changelog, build ]
    permissions:
      contents: write
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Download artifacts'
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: 'Push Tag'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ needs.get-version.outputs.version_name }}
          git push origin ${{ needs.get-version.outputs.version_name }} --force

      - name: 'Create GitHub release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.version_name }}
          body: ${{ needs.prepare-changelog.outputs.release_body }}
          files: |
            HomeMedkit.apk
            HomeMedkit.aab
