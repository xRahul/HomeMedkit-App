name: 'Release'

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version Bump Type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_code: ${{ steps.bump.outputs.version_code }}
      version_name: ${{ steps.bump.outputs.version_name }}
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 'Setup Python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 'Bump version in build.gradle'
        id: bump
        run: |
          python - <<EOF
          import re
          import os

          path = 'app/build.gradle.kts'
          with open(path, 'r') as f:
              content = f.read()

          code_match = re.search(r'versionCode\s*=\s*(\d+)', content)
          name_match = re.search(r'versionName\s*=\s*"([^"]+)"', content)

          old_code = int(code_match.group(1))
          old_name = name_match.group(1)

          new_code = old_code + 1
          major, minor, patch = map(int, old_name.split('.'))

          bump_type = "${{ github.event.inputs.version_bump }}"
          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          elif bump_type == "patch":
              patch += 1

          new_name = f"{major}.{minor}.{patch}"

          content = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {new_code}', content)
          content = re.sub(r'versionName\s*=\s*"[^"]+"', f'versionName = "{new_name}"', content)

          with open(path, 'w') as f:
              f.write(content)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"version_code={new_code}\n")
              f.write(f"version_name={new_name}\n")
          
          print(f"Bumped to {new_name} ({new_code})")
          EOF

      - name: 'Commit and push version bump'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version_name }} (${{ steps.bump.outputs.version_code }})"
          git push origin HEAD:${{ github.ref }}

  validation:
    name: Validation
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v6

      - name: 'Run Lint and Tests'
        run: ./gradlew lintRelease testDebugUnitTest

  build:
    name: Build & Sign
    needs: [ bump-version, validation ]
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v6

      - name: 'Build release artifacts'
        run: ./gradlew assembleRelease assembleDebug bundleRelease
        env:
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}

      - name: 'Sign release APK'
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Sign debug APK'
        id: sign_debug_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/debug
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Sign release AAB'
        id: sign_aab
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/bundle/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 'Rename artifacts'
        run: |
          SIGNED_APK_FILE=$(find ${{ steps.sign_apk.outputs.signedFile }} -name '*.apk' | head -n 1)
          mv "$SIGNED_APK_FILE" "MedicineKit.apk"

          SIGNED_DEBUG_APK_FILE=$(find ${{ steps.sign_debug_apk.outputs.signedFile }} -name '*.apk' | head -n 1)
          mv "$SIGNED_DEBUG_APK_FILE" "MedicineKit-debug.apk"
          
          SIGNED_AAB_FILE=$(find ${{ steps.sign_aab.outputs.signedFile }} -name '*.aab' | head -n 1)
          mv "$SIGNED_AAB_FILE" "MedicineKit.aab"

      - name: 'Upload artifacts'
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            MedicineKit.apk
            MedicineKit-debug.apk
            MedicineKit.aab

  create-release:
    name: Create GitHub Release
    needs: [ bump-version, build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Download artifacts'
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts

      - name: 'Generate changelog'
        id: changelog
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # If no tags, get all commits
            CHANGELOG=$(git log --pretty=format:"* %s")
          else
            CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"* %s")
          fi
          
          DESC="### 📦 Which version to install?

| File | Description | Recommended for... |
| :--- | :--- | :--- |
| **MedicineKit.apk** | Standard release version. Highly optimized and secure. | **Most users.** |
| **MedicineKit-debug.apk** | Debug-friendly version. Includes readable logs and popups for troubleshooting. | **Reporting bugs / developers.** |

> [!TIP]
> Both versions are signed with the same key. You can install the debug version over the release version (and vice-versa) without losing your data.

---
### 📝 Changelog
"
          
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo "$DESC" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: 'Push Tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.bump-version.outputs.version_name }}
          git push origin ${{ needs.bump-version.outputs.version_name }}

      - name: 'Create GitHub release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.version_name }}
          name: Release ${{ needs.bump-version.outputs.version_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            MedicineKit.apk
            MedicineKit-debug.apk
            MedicineKit.aab
